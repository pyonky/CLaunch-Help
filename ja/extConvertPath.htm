<title>相対パス、絶対パスへの一括変換</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="stylesheet" type="text/css" href="help.css">
</head>

<body>

<div class="h1"><img src="images/Title.png">相対パス、絶対パスへの一括変換</div>

<div class="p1">
登録されている全ての通常ファイル系アイテムを、相対パスまたは絶対パスへ一括変換することができます。<br>

<div class="gap1"><br></div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
変換を実行するには、「<a href="menuMain.htm">メインメニュー</a>」から「メンテナンス」 → 「相対パスへ一括変換」または「絶対パスへ一括変換」を選択してください。
</div>
<div class="list"><img src="images/Dot_s.png" class="listicon">
相対パスとは、ファイルの場所を「CLaunch.exe」が置かれているフォルダーからの相対位置関係で表す形式です。<br>
USBメモリなどで持ち運ぶ場合に向いています。
</div>
<div class="list"><img src="images/Dot_s.png" class="listicon">
絶対パスとは、ファイルの場所を「C:\aaa\bbb\ccc.exe」のように、ルートディレクトリからの階層位置で表す形式です。<br>
標準ではこの形式で登録されます。
</div>
</div>

</body>
</html>
