<html>

<title>イベントによるアイテムの起動</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="stylesheet" type="text/css" href="help.css">
</head>

<body>

<div class="h1"><img src="images/Title.png">イベントによるアイテムの起動</div>

<div class="p1">
任意のアイテムを所定のイベント発生時に自動で起動させることができます。<br>
自動起動を設定できるイベントは、以下の4種類です。<br>

<ul>
<li>CLaunch起動時</li>
<li>CLaunch終了時</li>
<li>スリープまたは休止状態への移行時</li>
<li>スリープまたは休止状態からの復帰時</li>
</ul>
<div class="gap1"><br></div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
イベント起動の設定はオプションの「<a href="optEvents.htm">イベント</a>」で行えます。
</div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
CLaunch起動時の自動起動はShiftキーを押しながらCLaunchを起動するとキャンセルできます。
</div>

</div>

</body>
</html>
