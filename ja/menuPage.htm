<html>
<head>
<title>ページメニュー</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="stylesheet" type="text/css" href="help.css">
</head>

<body>

<div class="h1"><img src="images/Title.png">ページメニュー</div>
<div class="p1">ページタブを右クリックすると表示されます。<br></div>

<div class="h2"><img src="images/Dot.png">ページ追加</div>
<div class="p2">新規にページを追加します。「<a href="menuMain.htm">メインメニュー</a>」の「ページ追加」と同じです。<br></div>

<div class="h2"><img src="images/Dot.png">ページ削除</div>
<div class="p2">表示中のページを削除します。<br></div>

<br><hr>

<div class="h2"><img src="images/Dot.png">アイテムの並べ替え</div>
<div class="p2">ページ内の登録アイテムを名前順に並べ替えます。<br>
ロックされているボタンは、並べ替えの対象から除外されます。<br></div>

<div class="h2"><img src="images/Dot.png">ページ内の全アイテムを起動</div>
<div class="p2">ページ内にある全ての登録アイテムを一括起動します。<br>
<a href="extSpecialItem.htm">追加機能系の特殊アイテム</a>と、サブメニュー内のアイテムは一括起動の対象に含まれません。<br></div>

<br><hr>

<div class="h2"><img src="images/Dot.png">プロパティ</div>
<div class="p2">ページ名、ページ別のデザイン設定などを行う「<a href="optPages.htm">ページ</a>」オプションを表示します。<br></div>

</body>
</html>
