<title>オーバーレイアイコン</title>

<body>

<div class="h1"><img src="images/Title.png">オーバーレイアイコン</div>

<div class="p1">
ボタンやメニューアイテムに表示されるメインのアイコンに重ねて、オーバーレイアイコンを追加表示することができます。<br>
ページ内にフォルダーや文書ファイルなど同じアイコンのアイテムが複数登録されている場合に、個別のオーバーレイアイコンを表示することで視認性が向上します。<br>

<div class="gap1"><br></div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
オーバーレイアイコンは「アイテムのプロパティ」で「<a href="dlgItemProp.htm#changeicon">アイコン変更</a>」ボタンをクリックし、表示された「アイコンの設定」ダイアログBOXで設定してください。
</div>

</div>

</body>
</html>
