<html>
<head>
<title>プラグイン (オプション ダイアログBOX)</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="stylesheet" type="text/css" href="help.css">
</head>

<body>

<div class="h1"><img src="images/Title.png">プラグイン (オプション ダイアログBOX)</div>

<div class="p1">
CLaunchに機能を追加する<a href="extPlugin.htm">プラグイン</a>を選択します。<br>
リストに表示されているプラグイン名の左側にあるチェックBOXをONにすると、選択したプラグインが有効化されます。
(リストに表示されているだけではプラグインとして機能しません。)
</div>

<div class="h2"><img src="images/Dot.png">バージョン情報</div>
<div class="p2">
プラグインリストで選択されているプラグインについてのバージョン情報、著作情報などを表示します。
</div>

<div class="h2"><img src="images/Dot.png">プラグインの設定</div>
<div class="p2">
プラグインリストで選択されているプラグインの設定画面を表示します。
</div>

<div class="h2"><img src="images/Dot.png">プラグインフォルダーを開く</div>
<div class="p2">
プラグインモジュール (DLLファイル)が置かれているフォルダーをオープンします。
</div>

</body>
</html>
