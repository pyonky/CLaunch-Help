<body>

<div class="h1"><img src="images/Title.png">ウィンドウサイズ (表示ボタン数) の変更</div>

<div class="p1">
ウィンドウの大きさは一般的なウィンドウと同じように、マウスでウィンドウの枠を掴み、ドラッグするだけで変更できます。<br>
カーソルがボタン1個分の距離を移動するまでは、サイズが変化しない点に注意してください。<br>
ウィンドウサイズを縮小して、登録アイテムが表示範囲外へ隠れた場合は、キーボード操作、マウス操作でボタンがスクロールするようになります。
</div>

</body>
</html>
