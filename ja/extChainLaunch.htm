<title>アイテムの同時起動</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="stylesheet" type="text/css" href="help.css">
</head>

<body>

<div class="h1"><img src="images/Title.png">アイテムの同時起動</div>

<div class="p1">
日常の作業で、毎回同じ組み合わせの複数アイテムを起動する場合は、「同時起動アイテム」を利用できます。<br>
アイテムのプロパティで「<a href="dlgItemProp.htm#chainlaunch">同時起動アイテム</a>」を設定しておけば、1つのボタンを押すだけで同時に複数のアイテムが起動するようになります。<br>

<div class="gap1"><br></div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
同時起動アイテムに「起動遅延」を設定しておくと、アイテムを起動する順序や起動待ち時間を調節することができます。
</div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
無限連鎖防止のため、同時起動されたアイテムからの連鎖起動はできないようになっています。
</div>

<div class="list"><img src="images/Dot_s.png" class="listicon">
単発の作業で複数のアイテムを起動する場合は、<a href="useLaunch.htm">連続起動モード</a>を利用してください。
</div>

</div>

</body>
</html>
